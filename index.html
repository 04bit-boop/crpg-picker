<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>滚动条与骰子 · CRPG 推荐器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+TC:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#080A10;
    --panel:#0F131C;
    --panel-2:#151B26;
    --brass:#C9A227;
    --brass-dim:#8A701C;
    --lich:#7B5FB0;
    --lich-dim:#4A3870;
    --ember:#D9683A;
    --vellum:#E4DFD2;
    --ash:#6E7686;
    --blood:#B03A3A;
    --line:rgba(228,223,210,.10);
    --f-disp:'Cinzel',serif;
    --f-body:'Noto Serif TC',serif;
    --f-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--void);
    color:var(--vellum);
    font-family:var(--f-body);
    font-weight:300;
    line-height:1.75;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    background-image:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(123,95,176,.14), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(201,162,39,.06), transparent 60%);
    background-attachment:fixed;
  }
  .wrap{max-width:860px;margin:0 auto;padding:0 24px 120px}

  /* ---------- hero ---------- */
  header{padding:88px 0 56px;text-align:center;position:relative}
  .sigil{
    font-family:var(--f-mono);font-size:11px;letter-spacing:.34em;
    color:var(--brass-dim);text-transform:uppercase;margin-bottom:22px;
  }
  h1{
    font-family:var(--f-disp);font-weight:700;
    font-size:clamp(38px,7vw,66px);line-height:1.05;
    letter-spacing:.02em;color:var(--vellum);
  }
  h1 .cast{
    display:block;font-size:.42em;letter-spacing:.3em;font-weight:400;
    color:var(--lich);margin-top:18px;text-transform:uppercase;
  }
  .thesis{
    margin:30px auto 0;max-width:540px;color:var(--ash);
    font-size:16px;line-height:1.9;
  }
  .rule{
    width:100%;height:1px;margin:52px 0;
    background:linear-gradient(90deg,transparent,var(--line) 15%,var(--line) 85%,transparent);
  }

  /* ---------- dialogue block ---------- */
  .q{
    border-left:2px solid var(--ember);
    padding:4px 0 4px 22px;margin:0 0 44px;
    animation:rise .45s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  .q .eyebrow{
    font-family:var(--f-mono);font-size:10px;letter-spacing:.28em;
    color:var(--ember);text-transform:uppercase;margin-bottom:10px;
  }
  .q .prompt{
    font-family:var(--f-disp);font-size:23px;font-weight:600;
    line-height:1.4;margin-bottom:6px;color:var(--vellum);
  }
  .q .sub{color:var(--ash);font-size:14.5px;margin-bottom:18px}
  .opts{list-style:none;display:flex;flex-direction:column;gap:2px}
  .opt{
    display:flex;gap:14px;align-items:baseline;
    padding:11px 14px;cursor:pointer;
    border:1px solid transparent;border-radius:2px;
    transition:background .16s,border-color .16s,transform .16s;
    background:transparent;text-align:left;width:100%;
    font-family:var(--f-body);font-size:16.5px;color:var(--vellum);font-weight:300;
  }
  .opt:hover{background:rgba(217,104,58,.07);border-color:rgba(217,104,58,.3);transform:translateX(3px)}
  .opt:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
  .opt .n{
    font-family:var(--f-mono);font-size:13px;color:var(--ember);
    min-width:18px;font-weight:600;
  }
  .opt.picked{background:rgba(201,162,39,.10);border-color:var(--brass-dim)}
  .opt.picked .n{color:var(--brass)}
  .opt .tail{color:var(--ash);font-size:13px;display:block;margin-top:2px;line-height:1.5}

  /* ---------- played-games picker ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .chip{
    font-family:var(--f-mono);font-size:12px;letter-spacing:.03em;
    padding:7px 12px;border:1px solid var(--line);border-radius:2px;
    background:transparent;color:var(--ash);cursor:pointer;
    transition:all .15s;
  }
  .chip:hover{border-color:var(--lich);color:var(--vellum)}
  .chip:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
  .chip.on{background:rgba(123,95,176,.18);border-color:var(--lich);color:var(--vellum)}
  .chip.on::before{content:'✦ ';color:var(--lich)}

  .act{
    margin-top:34px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;
  }
  .btn{
    font-family:var(--f-disp);font-weight:600;font-size:15px;letter-spacing:.12em;
    text-transform:uppercase;padding:14px 30px;cursor:pointer;
    background:var(--brass);color:var(--void);border:none;border-radius:2px;
    transition:filter .15s,transform .15s;
  }
  .btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
  .btn:focus-visible{outline:2px solid var(--vellum);outline-offset:3px}
  .btn.ghost{background:transparent;color:var(--ash);border:1px solid var(--line)}
  .btn.ghost:hover{color:var(--vellum);border-color:var(--ash)}
  .btn[disabled]{opacity:.35;cursor:not-allowed;transform:none;filter:none}
  .hint{font-family:var(--f-mono);font-size:11.5px;color:var(--ash);letter-spacing:.05em}

  /* ---------- stat block (signature) ---------- */
  .sheet{
    border:1px solid var(--line);background:var(--panel);
    padding:0;margin:0 0 46px;animation:rise .5s cubic-bezier(.2,.7,.3,1) both;
  }
  .sheet-hd{
    background:var(--panel-2);border-bottom:1px solid var(--line);
    padding:16px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .sheet-hd h2{
    font-family:var(--f-disp);font-size:15px;font-weight:600;
    letter-spacing:.2em;text-transform:uppercase;color:var(--brass);
  }
  .sheet-hd .meta{font-family:var(--f-mono);font-size:11px;color:var(--ash);letter-spacing:.1em}
  .stats{padding:8px 0}
  .stat{
    display:grid;grid-template-columns:112px 1fr 42px;
    gap:16px;align-items:center;padding:11px 22px;
    border-bottom:1px solid rgba(228,223,210,.05);
  }
  .stat:last-child{border-bottom:none}
  .stat .k{
    font-family:var(--f-mono);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ash);
  }
  .track{height:5px;background:rgba(228,223,210,.07);border-radius:0;position:relative;overflow:hidden}
  .fill{
    height:100%;background:linear-gradient(90deg,var(--lich-dim),var(--lich));
    width:0;transition:width .9s cubic-bezier(.2,.8,.2,1);
  }
  .stat .v{
    font-family:var(--f-mono);font-size:18px;font-weight:600;
    color:var(--vellum);text-align:right;
  }
  .stat .note{
    grid-column:2 / 4;font-size:13px;color:var(--ash);margin-top:-4px;
  }

  /* ---------- results ---------- */
  .verdict{
    font-family:var(--f-mono);font-size:11px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--brass-dim);margin:0 0 20px;
  }
  .rec{
    border:1px solid var(--line);border-left:2px solid var(--lich);
    background:var(--panel);padding:22px 24px;margin-bottom:14px;
    animation:rise .5s cubic-bezier(.2,.7,.3,1) both;
  }
  .rec:first-of-type{border-left-color:var(--brass)}
  .rec-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:8px}
  .rec h3{
    font-family:var(--f-disp);font-size:21px;font-weight:600;line-height:1.3;
  }
  .rec .orig{
    font-family:var(--f-mono);font-size:11.5px;color:var(--ash);
    letter-spacing:.04em;margin-top:3px;display:block;
  }
  .dc{
    font-family:var(--f-mono);font-size:11px;letter-spacing:.1em;
    color:var(--brass);white-space:nowrap;text-align:right;line-height:1.5;
  }
  .dc b{display:block;font-size:21px;font-weight:600;color:var(--vellum)}
  .rec p{font-size:15px;color:var(--vellum);opacity:.85;margin-top:10px}
  .why{
    font-family:var(--f-mono);font-size:11.5px;color:var(--ash);
    margin-top:12px;padding-top:12px;border-top:1px solid rgba(228,223,210,.06);
    letter-spacing:.02em;line-height:1.8;
  }
  .why span{color:var(--lich)}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
  .tag{
    font-family:var(--f-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ash);border:1px solid var(--line);padding:3px 8px;
  }
  footer{
    text-align:center;padding:60px 0 0;color:var(--ash);
    font-family:var(--f-mono);font-size:11px;letter-spacing:.14em;
  }
  .hidden{display:none}
  @media(max-width:600px){
    .stat{grid-template-columns:88px 1fr 36px;gap:11px;padding:10px 16px}
    .sheet-hd{padding:14px 16px}
    .rec{padding:18px 16px}
    header{padding:60px 0 40px}
  }
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="sigil">投掷一次 · 决定接下来的三百小时</div>
  <h1>滚动条与骰子<span class="cast">CRPG 推荐器</span></h1>
  <p class="thesis">回答几个问题。系统会把你的答案换算成四项数值，拿去跟数据库里的每一款游戏比对距离，然后告诉你哪一款最接近你。</p>
</header>

<div class="rule"></div>

<main id="quiz"></main>

<div id="out" class="hidden"></div>

<footer>数据库 · <span id="dbcount">0</span> 款 · 持续增补</footer>
</div>

<script>

   text     0(能跳过) → 10(读到眼睛脱窗)
================================= */

  {zh:"创世纪系列",en:"Ultima",era:9,turn:8,protag:7,text:6,tags:["西幻","始祖"],blurb:"四代第一次让「你是什么样的人」成为机制。整个类型的道德系统从这里开始。"},

/* ============ 题目 ============ */
const Q = [
  {
    id:"entry", eyebrow:"角色创建 · 第一步", prompt:"你玩过CRPG吗？",
    sub:"这一题决定后面问什么。诚实回答，没人在评分。",
    opts:[
      {t:"完全没有。这是第一次。", tail:"→ 走简短路线，只问三题", v:"new"},
      {t:"玩过几款，算是半个门内人。", tail:"→ 完整问卷", v:"some"},
      {t:"我玩了很多。给我点没玩过的。", tail:"→ 完整问卷 + 已玩清单校准", v:"vet"}
    ]
  },
  {
    id:"era", eyebrow:"耐受度检定", prompt:"你能忍受多老的游戏？",
    sub:"这是最强的过滤器。画面和接口的年代感，劝退掉的人比难度多。",
    opts:[
      {t:"我要现代的。没有高画质我就退款。", tail:"2020年之后", v:1},
      {t:"十年内都可以，别太古早。", tail:"约2014起", v:3},
      {t:"2D等距视角没问题，我读得下去。", tail:"Infinity Engine 时代", v:4.5},
      {t:"画面是什么？我只要规则够深。", tail:"90年代也吃得下", v:6.5},
      {t:"给我方格纸，我自己画地图。", tail:"古董区，全部开放", v:9}
    ]
  },
  {
    id:"turn", eyebrow:"战斗系统", prompt:"你想怎么打架？",
    sub:"这一轴决定的是节奏，不是难度。",
    opts:[
      {t:"回合制。我要慢慢想、算数字。", tail:"BG3、神界、行商浪人", v:10},
      {t:"即时暂停。混乱中按空白键的快感。", tail:"博德之门、柱子", v:5},
      {t:"动作。我要自己挥剑。", tail:"巫师、上古卷轴", v:0},
      {t:"我对战斗没兴趣，能绕过最好。", tail:"极乐迪斯科、颓废年代", v:10, extra:{lowCombat:true}}
    ]
  },
  {
    id:"protag", eyebrow:"叙事重心", prompt:"你想在故事里是什么？",
    sub:"这一题比题材更能决定你会不会爱上一款游戏。",
    opts:[
      {t:"我要「我是谁」本身就是谜题。", tail:"异域镇魂曲、KOTOR、Esoteric Ebb", v:10},
      {t:"我要当那个决定一切的人。", tail:"行商浪人、正义之怒", v:8},
      {t:"我想自己定义主角，但不用当救世主。", tail:"博德之门3、新维加斯", v:5.5},
      {t:"世界比我重要。我只是路过。", tail:"辐射、哥特、Underrail", v:1.5}
    ]
  },
  {
    id:"text", eyebrow:"阅读量", prompt:"你愿意读多少字？",
    sub:"这一题和年代一样重要。有些游戏的文本量等于一本长篇小说，选错会在第一小时退款。",
    opts:[
      {t:"越多越好。我是文艺b。", tail:"", v:10},
      {t:"我有读书习惯，但暂时不想摄入严肃文学作品。", tail:"", v:7},
      {t:"适量。我爱读网文，视觉小说也可以接受。", tail:"", v:4.5},
      {t:"能跳过就跳过。", tail:"", v:1.5}
    ]
  },
  {
    id:"tag", eyebrow:"外皮", prompt:"你想待在哪个世界？",
    sub:"权重最低的一轴。合不合，主要看上面四项。",
    opts:[
      {t:"西方奇幻。剑、龙、D&D。", tail:"", v:["西幻","D&D"]},
      {t:"科幻。太空、义体、企业。", tail:"", v:["科幻","赛博","星战","战锤"]},
      {t:"末世。废墟、辐射、没有明天。", tail:"", v:["末世"]},
      {t:"阴暗现代。都市、吸血鬼、侦探。", tail:"", v:["都市","哥德","低魔"]},
      {t:"无所谓，游戏好就行。", tail:"", v:[]}
    ]
  }
];

/* ============ 状态 ============ */
const A = {};           // answers
const PICK = {};         // 记住每题点的是第几个选项（按 index，避免同值选项一起亮）
const played = new Set();
let idx = 0;

const quiz = document.getElementById('quiz');
const out  = document.getElementById('out');
document.getElementById('dbcount').textContent = DB.length;

function flow(){
  // 新人只走 era 之外的简短路线
  if(A.entry === 'new') return ['entry','era','turn','text','tag'];
  const base = ['entry','era','turn','protag','text','tag'];
  if(A.entry === 'vet') base.push('_played');
  return base;
}

function render(){
  const order = flow();
  quiz.innerHTML = '';
  order.slice(0, idx+1).forEach(id=>{
    if(id === '_played') quiz.appendChild(playedBlock());
    else quiz.appendChild(qBlock(Q.find(q=>q.id===id)));
  });
  const last = quiz.lastElementChild;
  if(last && idx>0) last.scrollIntoView({block:'center'});
}

function qBlock(q){
  const el = document.createElement('section');
  el.className = 'q';
  el.innerHTML = `<div class="eyebrow">${q.eyebrow}</div>
    <div class="prompt">${q.prompt}</div>
    <div class="sub">${q.sub}</div>`;
  const ul = document.createElement('ul');
  ul.className = 'opts';
  q.opts.forEach((o,i)=>{
    const li = document.createElement('li');
    const b  = document.createElement('button');
    b.className = 'opt' + (PICK[q.id] === i ? ' picked':'');
    b.innerHTML = `<span class="n">${i+1}.</span><span>${o.t}${o.tail?`<span class="tail">${o.tail}</span>`:''}</span>`;
    b.onclick = ()=>{
      A[q.id] = o.v;
      PICK[q.id] = i;
      if(o.extra) Object.assign(A, o.extra);
      const order = flow();
      const pos = order.indexOf(q.id);
      if(pos === order.length-1){ finish(); return; }
      idx = Math.max(idx, pos+1);
      out.classList.add('hidden');
      render();
    };
    li.appendChild(b); ul.appendChild(li);
  });
  el.appendChild(ul);
  return el;
}

function playedBlock(){
  const el = document.createElement('section');
  el.className = 'q';
  el.innerHTML = `<div class="eyebrow">校准 · 最后一步</div>
    <div class="prompt">哪些你已经玩过了？</div>
    <div class="sub">玩过的游戏比任何一题都准。系统会拿它们去修正你的坐标，然后把它们从结果里剔除。</div>`;
  const box = document.createElement('div');
  box.className = 'chips';
  DB.forEach((g,i)=>{
    const c = document.createElement('button');
    c.className = 'chip' + (played.has(i)?' on':'');
    c.textContent = g.zh;
    c.onclick = ()=>{ played.has(i)?played.delete(i):played.add(i); c.classList.toggle('on'); };
    box.appendChild(c);
  });
  el.appendChild(box);
  const act = document.createElement('div');
  act.className = 'act';
  const go = document.createElement('button');
  go.className='btn'; go.textContent='掷骰';
  go.onclick = finish;
  const hint = document.createElement('span');
  hint.className='hint'; hint.textContent='没玩过任何一款也可以直接掷';
  act.appendChild(go); act.appendChild(hint);
  el.appendChild(act);
  return el;
}

/* ============ 计算 ============ */
function finish(){
  // 用户坐标
  let v = {
    era:    A.era    ?? (A.entry==='new' ? 1.5 : 3),
    turn:   A.turn   ?? 6,
    protag: A.protag ?? 5.5,
    text:   A.text   ?? (A.entry==='new' ? 4 : 6)
  };
  const wantTags = A.tag || [];

  // 已玩过的游戏反过来校准坐标（权重 35%）
  const pl = [...played].map(i=>DB[i]);
  if(pl.length){
    const avg = k => pl.reduce((s,g)=>s+g[k],0)/pl.length;
    ['era','turn','protag','text'].forEach(k=>{
      v[k] = v[k]*0.65 + avg(k)*0.35;
    });
  }

  const W = {era:1.35, turn:1.0, protag:1.15, text:1.2};
  const scored = DB.map((g,i)=>{
    if(played.has(i)) return null;
    let d = 0;
    for(const k in W){ d += W[k] * Math.pow(g[k]-v[k], 2); }
    let dist = Math.sqrt(d);
    // 题材：命中就拉近
    const hit = wantTags.length ? g.tags.some(t=>wantTags.includes(t)) : false;
    if(hit) dist *= 0.72;
    // 不想打架的人，避开纯战术
    if(A.lowCombat && g.text < 6) dist *= 1.4;
    if(A.entry === 'new' && v.era < 4 && g.newbie) dist *= 0.5;
    return {g, dist, hit, i};
  }).filter(Boolean).sort((a,b)=>a.dist-b.dist);

  show(v, scored.slice(0,4), pl.length);
}

const AXIS = [
  {k:'era',    label:'年代耐受',  note:v=>v<2?'你要崭新的东西':v<4?'近十年最舒服':v<6?'2D等距没问题':v<8?'能吃90年代':'你连方格纸都能接受'},
  {k:'turn',   label:'回合倾向',  note:v=>v>7.5?'你要慢慢算':v>3.5?'即时暂停的节奏':'你要自己挥剑'},
  {k:'protag', label:'主角重量',  note:v=>v>8?'「我是谁」必须是内核':v>5?'你要能决定事情':v>3?'不当救世主也行':'世界比你重要'},
  {k:'text',   label:'阅读耐力',  note:v=>v>8?'你来就是为了读':v>6?'份量重没关系':v>3?'适量':'能跳过就跳过'}
];

function show(v, list, plCount){
  const stats = AXIS.map(a=>{
    const val = v[a.k];
    return `<div class="stat">
      <span class="k">${a.label}</span>
      <span class="track"><span class="fill" style="width:${val*10}%"></span></span>
      <span class="v">${val.toFixed(1)}</span>
      <span class="note">${a.note(val)}</span>
    </div>`;
  }).join('');

  const recs = list.map((r,n)=>{
    const dc = Math.max(4, Math.round(30 - r.dist*2.6));
    const bits = [];
    AXIS.forEach(a=>{
      const gap = Math.abs(r.g[a.k]-v[a.k]);
      if(gap < 1.6) bits.push(`<span>${a.label}</span> 几乎重合`);
    });
    if(r.hit) bits.push(`题材 <span>命中</span>`);
    if(!bits.length) bits.push(`整体最接近，但没有一轴完全贴合 — 值得一试的意外`);
    return `<article class="rec" style="animation-delay:${n*70}ms">
      <div class="rec-top">
        <div>
          <h3>${r.g.zh}</h3>
          <span class="orig">${r.g.en}</span>
        </div>
        <div class="dc">匹配<b>${dc}</b></div>
      </div>
      <p>${r.g.blurb}</p>
      <div class="tags">${r.g.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="why">${bits.join(' · ')}</div>
    </article>`;
  }).join('');

  out.innerHTML = `
    <div class="rule"></div>
    <section class="sheet">
      <div class="sheet-hd">
        <h2>你的角色卡</h2>
        <span class="meta">${plCount?`已玩 ${plCount} 款 · 坐标已校准`:'未校准'}</span>
      </div>
      <div class="stats">${stats}</div>
    </section>
    <p class="verdict">按距离排序 · 第一项最接近</p>
    ${recs}
    <div class="act">
      <button class="btn ghost" id="again">重新来过</button>
    </div>`;
  out.classList.remove('hidden');
  requestAnimationFrame(()=>{
    out.scrollIntoView({behavior:'smooth',block:'start'});
  });
  document.getElementById('again').onclick = ()=>{
    for(const k in A) delete A[k];
    for(const k in PICK) delete PICK[k];
    played.clear(); idx = 0;
    out.classList.add('hidden'); out.innerHTML='';
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  };
}

render();
</script>
